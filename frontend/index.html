<!DOCTYPE html>
<html>
<head>
    <title>Capstone Project App</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/themes.css">
</head>

<body>  
    <div class="dashboard">
        <div id="system-duration"></div>
        <div id="system-time_sec"></div>
        <div id="system-arousal"></div>
        <div id="system-state"></div>
        <div id="system-stability"></div>
        <button id="resetBtn">Reset Machine</button>
        <button id="killBtn">Kill Machine</button>
        <button id="initBtn">Init Machine</button>
        <br>
        <button id="calmBtn">Calm</button>
        <button id="neutralBtn">Neutral</button>
        <button id="engagedBtn">Engaged</button>
        <button id="overloadedBtn">Overloaded</button>
    </div>

    <div class="container">
        <div class="object" style="--i:0"></div>
        <div class="object" style="--i:1"></div>
        <div class="object" style="--i:2"></div>
        <div class="object" style="--i:3"></div>
        <div class="object" style="--i:4"></div>
        <div class="object" style="--i:5"></div>
        <div class="object" style="--i:6"></div>
        <div class="object" style="--i:7"></div>
        <div class="object" style="--i:8"></div>
        <div class="object" style="--i:9"></div>
        <div class="object" style="--i:10"></div>
        <div class="object" style="--i:11"></div>
        <div class="object" style="--i:12"></div>
        <div class="object" style="--i:13"></div>
        <div class="object" style="--i:14"></div>
        <div class="origin" style="--i:15"></div>
    </div>
    <script src="/static/app.js"></script>
    
</body>


</html>
